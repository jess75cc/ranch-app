<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Grass Valley Ranch – Working Ranch Model</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 8px; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    h2 { font-size: 16px; margin: 8px 0 4px; }
    .tabs { display: flex; margin-bottom: 8px; flex-wrap: wrap; }
    .tab {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      text-align: center;
      font-size: 13px;
    }
    .tab.active { background: #ddd; }
    .tabcontent { display: none; }
    .tabcontent.active { display: block; }
    .section {
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fafafa;
    }
    label { display: block; font-size: 13px; margin-top: 4px; }
    input, select {
      width: 100%;
      padding: 5px;
      box-sizing: border-box;
      font-size: 13px;
      margin-top: 2px;
    }
    .kpi { font-size: 14px; margin: 2px 0; }
    .kpi span { font-weight: bold; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { border: 1px solid #ccc; padding: 4px; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-size: 15px;
    }
    .small-btn {
      width: auto;
      padding: 6px 10px;
      margin-top: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Grass Valley Ranch</h1>
  <div>Working Ranch Model – Interactive App</div>

  <div class="tabs">
    <div class="tab active" data-tab="home">Home</div>
    <div class="tab" data-tab="inputs">Inputs</div>
    <div class="tab" data-tab="allotments">Allotments</div>
    <div class="tab" data-tab="bulls">Bulls</div>
    <div class="tab" data-tab="calving">Calving</div>
    <div class="tab" data-tab="feed">Winter Feed</div>
    <div class="tab" data-tab="blm">BLM / AUM</div>
  </div>

  <!-- HOME / DASHBOARD -->
  <div id="home" class="tabcontent active">
    <div class="section">
      <h2>Quick Stats</h2>
      <div class="kpi">Breeding females: <span id="kpi_breeding_females">–</span></div>
      <div class="kpi">Total bulls to run: <span id="kpi_total_bulls">–</span></div>
      <div class="kpi">Expected weaned calves: <span id="kpi_weaned_calves">–</span></div>
      <div class="kpi">Winter hay (tons): <span id="kpi_winter_hay_tons">–</span></div>
      <div class="kpi">Winter feed cost: <span id="kpi_winter_feed_cost">–</span></div>
      <div class="kpi">AUMs required: <span id="kpi_aums_required">–</span></div>
    </div>
  </div>

  <!-- INPUTS -->
  <div id="inputs" class="tabcontent">
    <div class="section">
      <h2>Herd counts (head)</h2>

        <input id="bred_cows" type="number" value="1000">
