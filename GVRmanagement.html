      <div class="section">
        <h2>Winter feed settings</h2>
        <label>Feed start date
          <input id="feed_start" type="date" value="2026-11-01" data-tab="inputs">
        </label>
        <label>Feed end date
          <input id="feed_end" type="date" value="2027-03-15" data-tab="inputs">
        </label>
        <label>Cows hay intake (lb/day)
          <input id="cow_intake" type="number" value="30" data-tab="inputs">
        </label>
        <label>Heifers hay intake (lb/day)
          <input id="heifer_intake" type="number" value="26" data-tab="inputs">
        </label>
        <label>Bulls hay intake (lb/day)
          <input id="bull_intake" type="number" value="28" data-tab="inputs">
        </label>
        <label>Hay waste/shrink (%)
          <input id="hay_waste" type="number" step="0.01" value="10" data-tab="inputs">
        </label>
        <label>Hay cost ($/ton)
          <input id="hay_cost" type="number" step="0.01" value="180" data-tab="inputs">
        </label>
      </div>
